name: Update Ultimate Podkop List

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches:
      - main
    paths:
      - "generate.py"
      - ".github/workflows/update.yml"

permissions:
  contents: write

concurrency:
  group: update-podkop-list
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Generate domain list
        run: python generate.py

      - name: Validate result
        run: |
          test -s ultimate-podkop-list.txt
          count=$(grep -v '^#' ultimate-podkop-list.txt | sed '/^[[:space:]]*$/d' | wc -l)
          echo "Domains: $count"
          test "$count" -ge 500

      - name: Commit updated list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ultimate-podkop-list.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update Ultimate Podkop List"
            git push
          fi
