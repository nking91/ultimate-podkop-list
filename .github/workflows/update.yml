name: Update Ultimate Podkop List

on:
  workflow_dispatch:
  schedule:
    - cron: "23 2 * * *"
  push:
    branches: [main]
    paths:
      - "generate.py"
      - ".github/workflows/update.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate list
        run: python generate.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ultimate-podkop-list.txt
          git diff --cached --quiet || git commit -m "Update Ultimate Podkop List"
          git push
